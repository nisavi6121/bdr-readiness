{% extends "base.html" %}
{% set nav_page = "kb" %}
{% block content %}
<h1 class="page-title">Knowledge Base</h1>
<p class="page-sub">Design decisions, issue catalogue, and discovery notes</p>

<div class="kb-layout">
  <nav class="kb-nav">
    {% for doc in docs %}
    <a href="/knowledge-base/{{ doc }}" {% if current==doc %}class="active"{% endif %}>
      {{ doc.replace('_',' ')|title }}
    </a>
    {% endfor %}
  </nav>
  <div class="kb-body">
    {{ content|safe }}
  </div>
</div>
{% endblock %}
